<!DOCTYPE html>
<html>

<head>
  <title>Uusi ilmoitus</title>
</head>

<body>
  <h1>Uusi ilmoitus</h1>
  <form action="/create_item" method="post">
    <p>
      Otsikko: <br />
      <input type="text" name="title" maxlength="50" required/>
    </p>
    <p>
      Kuvaus: <br />
      <textarea rows="8" cols="60" name="description" maxlength="1000" required></textarea>
    </p>
    <p>
      Annoksia tarjolla: <br />
      <input type="text" name="servings" size="4" pattern="[1-9][0-9]{0,3}" required/>
    </p>
    <input type="submit" value="Luo ilmoitus" />
  </form>
</body>

</html>
